  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
    <script>
      // Widget navigation Hallucine : visible uniquement pour les admins connectés
      (function() {
        function loadNavWidget() {
          fetch('/api/trpc/auth.me', { credentials: 'include' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
              var json = data && data.result && data.result.data && data.result.data.json;
              if (json && json.role === 'admin') {
                var s = document.createElement('script');
                s.src = 'https://hallucine.manus.space/api/nav-widget';
                document.body.appendChild(s);
              }
            })
            .catch(function() {});
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', loadNavWidget);
        } else {
          loadNavWidget();
        }
      })();
    </script>
  </body>

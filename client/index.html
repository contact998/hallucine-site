    <!-- Polices Google Fonts — chargement NON bloquant. Bascule media=print→all via <script>
         (et non onload= inline, bloqué par la CSP helmet script-src-attr 'none'). display=swap.
         Self-host des .woff2 = étape suivante recommandée (perf + RGPD : plus d'IP visiteur chez Google). -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" />
    <link id="hf-fonts" rel="stylesheet" media="print" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" />
    <script>
      (function () {
        var l = document.getElementById("hf-fonts");
        if (!l) return;
        var apply = function () { l.media = "all"; };
        if (l.sheet) apply(); else l.addEventListener("load", apply);
      })();
    </script>
    <noscript>

    <!-- Chatwoot live chat widget (self-hosted, same-site domain chat.hallucinecran.fr).
         chatwootSettings est lu AVANT le chargement du SDK pour overrider les
         textes "We are away" — l'IA Captain AI répond 24/7 derrière, donc
         on affiche un message positif unique en ligne / hors-ligne. -->
    <script>
      window.chatwootSettings = {
        type: "standard",
        launcherTitle: "Besoin d'aide ?",
        welcomeTitle: "Bonjour, comment pouvons-nous vous aider ?",
        welcomeTagline: "Laissez votre nom, votre email et votre message. Notre assistant répond tout de suite.",
        availableMessage: "Assistant disponible",
        unavailableMessage: "Assistant disponible",
        showPopoutButton: false,
      };
      (function (d, t) {
        var hostMap = {
          "hallucinecran.fr": "chat.hallucinecran.fr",
          "www.hallucinecran.fr": "chat.hallucinecran.fr"
        };
        var host = window.location.hostname;
        var BASE_URL = "https://" + (hostMap[host] || "chat.hallucinecran.fr");
        var g = d.createElement(t),
          s = d.getElementsByTagName(t)[0];
        g.src = BASE_URL + "/packs/js/sdk.js";
        g.defer = true;
        g.async = true;
        s.parentNode.insertBefore(g, s);
        g.onload = function () {
          window.chatwootSDK.run({
            websiteToken: "msdo66GfzwuNM29FGSkfmXfK",
            baseUrl: BASE_URL,
          });
        };
      })(document, "script");
    </script>
